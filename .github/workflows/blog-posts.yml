name: Update README with latest posts

on:
  schedule:
    - cron: "0 0 * * *" # 매일 00:00 UTC
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write # README에 커밋하려면 필요

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.sngchn.dev/rss.xml"
          max_post_count: 5
          template: "- [$title]($url) <sub>$date</sub>$newline"
          date_format: "yy.mm.dd"
